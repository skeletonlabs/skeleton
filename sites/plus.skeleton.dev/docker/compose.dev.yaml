services:
  db:
    image: postgres:17
    restart: unless-stopped
    ports:
      - 5432:5432
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: mysecretpassword
      POSTGRES_DB: local
    volumes:
      - pgdata:/var/lib/postgresql/data
  mock-oauth2-server:
    image: ghcr.io/navikt/mock-oauth2-server:3.0.3
    ports:
      - 8080:8080
    # On Linux based systems you need to add "127.0.0.1 host.docker.internal" to your /etc/hosts file
    hostname: host.docker.internal
    environment:
      JSON_CONFIG: |
        {
          "interactiveLogin": true,
          "httpServer": "NettyWrapper",
          "tokenCallbacks": [
            {
              "issuerId": "local",
              "tokenExpiry": 120,
              "requestMappings": [
                {
                  "requestParam": "code",
                  "match": "*",
                  "claims": {
                    "sub": "local-dev-user",
                    "name": "Local Dev User",
                    "given_name": "Local",
                    "family_name": "Dev User",
                    "email": "local@dev.local",
                    "email_verified": true,
                    "picture": "https://gravatar.com/avatar/0000000000000000000000000000000000000000?d=mp",
                    "aud": ["test-client-id"],
                    "scope": ["openid", "profile"]
                  }
                }
              ]
            }
          ]
        }
volumes:
  pgdata:
